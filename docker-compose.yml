version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=RootPW!2025
      - POSTGRES_DB=freieforschung
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - freieforschung-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freieforschung"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth_service:
    build:
      context: ./backend/auth_service
    env_file:
      - ./backend/auth_service/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - freieforschung-network
    command:
      - sh
      - -c
      - |
        ./wait-for-it.sh db:5432 --timeout=30 --strict -- \
        uvicorn auth_service.main:app --host 0.0.0.0 --port 8000

  project_service:
    build:
      context: ./backend/project_service
    env_file:
      - ./backend/project_service/.env
    ports:
      - "8001:8001"
    depends_on:
      - db
    networks:
      - freieforschung-network
    command:
      - sh
      - -c
      - |
        ./wait-for-it.sh db:5432 --timeout=30 --strict -- \
        uvicorn project_service.main:app --host 0.0.0.0 --port 8001

  hypothesis_service:
    build:
      context: ./backend/hypothesis_service
    env_file:
      - ./backend/hypothesis_service/.env
    ports:
      - "8002:8002"
    depends_on:
      - db
    networks:
      - freieforschung-network
    command:
      - sh
      - -c
      - |
        ./wait-for-it.sh db:5432 --timeout=30 --strict -- \
        uvicorn hypothesis_service.main:app --host 0.0.0.0 --port 8002

networks:
  freieforschung-network:
    driver: bridge

volumes:
  db_data:
