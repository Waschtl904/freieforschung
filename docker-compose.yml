# freieforschung-at/docker-compose.yml
services:
  db:
    image: postgres:17.5
    container_name: freieforschung-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=RootPW!2025
      - POSTGRES_DB=freieforschung
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freieforschung"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./backend/auth_service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_VERSION=${APP_VERSION}
      - NODE_ENV=${NODE_ENV}
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy

  project_service:
    build:
      context: ./backend/project_service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_VERSION=${APP_VERSION}
      - NODE_ENV=${NODE_ENV}
    ports:
      - "8001:8001"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      db:
        condition: service_healthy

  hypothesis_service:
    build:
      context: ./backend/hypothesis_service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_VERSION=${APP_VERSION}
      - NODE_ENV=${NODE_ENV}
    ports:
      - "8002:8002"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
    