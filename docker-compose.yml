services:
  db:
    image: postgres:14
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=RootPW!2025
      - POSTGRES_DB=freieforschung
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  auth_service:
    build:
      context: ./backend/auth_service
    restart: on-failure
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:RootPW!2025@db:5432/freieforschung
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - backend

  project_service:
    build:
      context: ./backend/project_service
    restart: on-failure
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:RootPW!2025@db:5432/freieforschung
    depends_on:
      - db
    ports:
      - "8001:8001"
    networks:
      - backend

  hypothesis_service:
    build:
      context: ./backend/hypothesis_service
    restart: on-failure
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:RootPW!2025@db:5432/freieforschung
    depends_on:
      - db
    ports:
      - "8002:8002"
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge

