version: '3.8'

services:
  # PostgreSQL 17.5 Datenbank-Service
  db:
    image: postgres:17.5
    container_name: freieforschung-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=freieforschung
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - freieforschung-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freieforschung"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth_service:
    build:
      context: ./backend/auth_service
    env_file:
      - ./backend/auth_service/.env
    ports:
      - "8000:8000"
    command: ["uvicorn", "auth_service.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - freieforschung-network

  project_service:
    build:
      context: ./backend/project_service
    env_file:
      - ./backend/project_service/.env
    ports:
      - "8001:8001"
    command: ["uvicorn", "project_service.main:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - freieforschung-network

  hypothesis_service:
    build:
      context: ./backend/hypothesis_service
    env_file:
      - ./backend/hypothesis_service/.env
    ports:
      - "8002:8002"
    command: ["uvicorn", "hypothesis_service.main:app", "--host", "0.0.0.0", "--port", "8002"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - freieforschung-network

networks:
  freieforschung-network:
    driver: bridge

volumes:
  db_data:
